  <h2 class="section-title">HEAR THE DIFFERENCE</h2>

  <div class="comparison-grid">

    <!-- LEFT COLUMN -->
    <div class="comparison-card"
         data-before="https://github.com/MataMusicEngineer/audio-b4-a4tr/raw/refs/heads/main/Hazael%20-%20Esto%20se%20llama%20vivir%20(Compilacio%CC%81n)%200_02.mp3"

      <div class="comparison-content">
        <h3>Hazael – Esto Se Llama Vivir</h3>
        <p class="genre">Colombian Chill Indie Rock</p>

        <div class="toggle-buttons">
          <button class="active-toggle" onclick="switchAudio(this, 'before')">Before</button>
          <button onclick="switchAudio(this, 'after')">After</button>
        </div>

        <audio controls class="comparison-audio">
          <source src="https://github.com/MataMusicEngineer/audio-b4-a4tr/raw/refs/heads/main/Hazael%20-%20Esto%20se%20llama%20vivir%20(Compilacio%CC%81n)%200_02.mp3" type="audio/mpeg">

    </div>

    <!-- RIGHT COLUMN - BEN FLOWERS -->
<div class="comparison-card"
